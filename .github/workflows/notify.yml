name: DRAM Discord Notifier

"on":
  schedule:
    # 22:40 JST = 13:40 UTC
    - cron: "40 13 * * * *"
    # Extra checks every 30 minutes. These notify only when a new dip level is reached.
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dram-discord-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decide run mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RUN_MODE=daily" >> "$GITHUB_ENV"
          elif [ "${{ github.event.schedule }}" = "40 13 * * * *" ]; then
            echo "RUN_MODE=daily" >> "$GITHUB_ENV"
          else
            echo "RUN_MODE=alert" >> "$GITHUB_ENV"
          fi

      - name: Run notifier
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          YAHOO_SYMBOL: DRAM
          DRAM_SYMBOL: DRAM
          TIMEZONE: Asia/Tokyo
          NOTIFY_ON_ERROR: "true"
          STATE_FILE: state/dip_state.json
          LOOKBACK_RANGE: 3mo
        run: python -m src.main

      - name: Commit alert state
        if: always()
        run: |
          if [ -n "$(git status --porcelain state/dip_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/dip_state.json
            git commit -m "Update DRAM alert state"
            git push
          else
            echo "No state changes."
          fi
